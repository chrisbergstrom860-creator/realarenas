<!DOCTYPE html>
<html lang="en">
<head>
<script>
window.BASE = window.location.pathname.startsWith('/html') ? '/html' : '';
window.nav = function(path){ window.location.href = window.BASE + path; };
document.addEventListener('DOMContentLoaded', function(){
  if (window.BASE === '') {
    document.querySelectorAll('[href^="/html/"]').forEach(function(el){ el.setAttribute('href', el.getAttribute('href').slice(5)); });
    document.querySelectorAll('[action^="/html/"]').forEach(function(el){ el.setAttribute('action', el.getAttribute('action').slice(5)); });
  }
});
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arenas — Athletes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/html/arenas.css">
<style>:root{--green-light:#ECFDF5;--blue-light:#EFF6FF;--orange-light:#FFF7ED;--purple-light:#F5F3FF;--teal:#14B8A6;--teal-light:#F0FDFA;--pink-light:#FBEAF0;--pink-dark:#9D174D}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
button,select,input,textarea{font-family:var(--font)}
@keyframes fade-up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.8)}}
@keyframes slide-in{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}/* ── LAYOUT ── *//* ── TOPBAR ── */
.topbar-search{display:flex;align-items:center;gap:8px;background:var(--gray-50);border:var(--border);border-radius:7px;padding:6px 12px;width:300px;transition:border-color .15s,box-shadow .15s}
.topbar-search:focus-within{border-color:var(--gray-400);box-shadow:0 0 0 3px rgba(107,114,128,.08)}
.topbar-search input{background:none;border:none;outline:none;font-size:13px;color:var(--gray-700);width:100%}
.topbar-search input::placeholder{color:var(--gray-400)}
.topbar-live{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--gray-500)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse-dot 2s ease-in-out infinite;flex-shrink:0}
.icon-btn{width:34px;height:34px;border-radius:7px;border:var(--border);background:white;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;position:relative;transition:background .1s}
.icon-btn:hover{background:var(--gray-50)}/* ── SIDEBAR ── */

/* ── MAIN ── */
.main{display:flex;flex-direction:column;overflow:hidden;min-height:calc(100vh - 56px)}

/* ── FILTER BAR ── */
.filter-zone{background:white;border-bottom:var(--border);position:sticky;top:0;z-index:150;padding:10px 20px;display:flex;flex-direction:column;gap:7px}
.filter-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.f-group-label{font-size:11px;font-weight:600;color:var(--gray-500);flex-shrink:0;text-transform:uppercase;letter-spacing:.05em;margin-right:2px}
.f-pill{padding:4px 13px;border-radius:20px;font-size:12px;font-weight:500;border:var(--border);background:white;color:var(--gray-600);cursor:pointer;transition:all .12s;white-space:nowrap;flex-shrink:0;user-select:none}
.f-pill:hover{border-color:var(--gray-400)}
.f-pill.on{background:var(--yellow-light);border-color:#fde68a;color:#7a5c00}
.f-sep{width:1px;height:18px;background:var(--gray-200);flex-shrink:0}
.f-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.view-toggle{display:flex;border:var(--border);border-radius:7px;overflow:hidden}
.vt-btn{padding:4px 12px;font-size:12px;font-weight:500;background:white;color:var(--gray-500);cursor:pointer;border:none;border-right:var(--border);transition:all .12s}
.vt-btn:last-child{border-right:none}
.vt-btn.on{background:var(--gray-900);color:white}
.sort-select{padding:5px 10px;border:var(--border);border-radius:7px;font-size:12px;color:var(--gray-600);background:white;outline:none;cursor:pointer}
.athlete-count{font-size:12px;color:var(--gray-500);white-space:nowrap}

/* ── BODY LAYOUT ── */
.body-grid{display:grid;grid-template-columns:1fr;flex:1;overflow:hidden}
.athletes-col{overflow-y:auto}
.athletes-col::-webkit-scrollbar{width:4px}
.athletes-col::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:2px}
.sidebar-col{overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:14px;border-left:var(--border)}
.sidebar-col::-webkit-scrollbar{display:none}

/* ── SECTION HEADERS ── */
.section-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 8px;background:white;border-bottom:var(--border);position:sticky;top:0;z-index:10}
.sh-title{font-size:13px;font-weight:600;color:var(--gray-900);display:flex;align-items:center;gap:5px}
.sh-link{font-size:12px;color:var(--gray-500);cursor:pointer;transition:color .1s}
.sh-link:hover{color:var(--gray-700)}

/* ── RECOMMENDED STRIP ── */
.rec-strip{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:var(--border);background:white}
.rec-card{padding:14px 16px;display:flex;flex-direction:column;gap:8px;border-right:var(--border);cursor:pointer;transition:background .12s;animation:fade-up .2s ease both}
.rec-card:last-child{border-right:none}
.rec-card:hover{background:var(--gray-50)}
.rc-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.rc-name{font-size:13px;font-weight:600;color:var(--gray-900)}
.rc-handle{font-size:11px;color:var(--gray-400);margin-top:1px}
.rc-why{font-size:11px;color:var(--gray-600);background:var(--yellow-light);border-left:2px solid var(--yellow-dark);padding:5px 8px;line-height:1.5;margin-top:2px}
.rc-stats{display:flex;gap:10px;flex-wrap:wrap}
.rc-stat{font-size:11px;color:var(--gray-500);font-family:var(--mono)}
.rc-stat strong{color:var(--gray-900);font-weight:600}

/* ── SPORT TABS ── */
.sport-tabs{display:flex;background:white;border-bottom:var(--border);padding:0 20px}
.sport-tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--gray-500);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:color .1s,border-color .1s;display:flex;align-items:center;gap:5px}
.sport-tab:hover{color:var(--gray-800)}
.sport-tab.on{color:var(--gray-900);border-bottom-color:var(--gray-900)}
.sport-tab .tab-count{font-size:10px;font-family:var(--mono);background:var(--gray-100);color:var(--gray-500);padding:1px 6px;border-radius:10px}
.sport-tab.on .tab-count{background:var(--gray-200);color:var(--gray-700)}

/* ── ATHLETE GRID ── */
.athlete-grid{display:grid;gap:0}
.athlete-grid.grid-2{grid-template-columns:1fr 1fr}
.athlete-grid.grid-3{grid-template-columns:1fr 1fr 1fr}
.athlete-grid.list-view{grid-template-columns:1fr}
@media (max-width:768px){.athlete-grid .athlete-card{border-right:none}}

.athlete-card{background:white;border-bottom:var(--border);border-right:var(--border);padding:16px;cursor:pointer;transition:background .12s;display:flex;flex-direction:column;gap:10px;animation:fade-up .2s ease both}
.athlete-card:hover{background:var(--gray-50)}
.grid-2 .athlete-card:nth-child(even){border-right:none}
.grid-3 .athlete-card:nth-child(3n){border-right:none}
.list-view .athlete-card{border-right:none;flex-direction:row;align-items:center;gap:16px}

.ac-head{display:flex;align-items:center;gap:10px}
.ac-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.ac-name{font-size:14px;font-weight:600;color:var(--gray-900);margin-bottom:1px}
.ac-location{font-size:11px;color:var(--gray-400)}
.ac-handle{font-size:11px;color:var(--gray-400)}

/* Pills */
.pill{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid transparent;white-space:nowrap;display:inline-block}
.p-run{background:var(--orange-light);color:#9A3412;border-color:#FDBA74}
.p-cyc{background:var(--blue-light);color:#1E40AF;border-color:#93C5FD}
.p-clm{background:var(--purple-light);color:#5B21B6;border-color:#C4B5FD}
.p-swm{background:var(--teal-light);color:#134E4A;border-color:#5EEAD4}
.p-tri{background:var(--pink-light);color:#72243E;border-color:#F4C0D1}
.p-adv{background:#FAEEDA;color:#633806;border-color:#EF9F27}
.p-int{background:var(--gray-100);color:var(--gray-600);border-color:var(--gray-200)}
.p-club{background:var(--green-light);color:#166534;border-color:#86EFAC}
.p-near{background:var(--blue-light);color:#1E40AF;border-color:#93C5FD}
.p-similar{background:var(--yellow-light);color:#7a5c00;border-color:#fde68a}

.ac-tags{display:flex;gap:4px;flex-wrap:wrap}

/* Stats */
.ac-mini-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.ms-item{background:var(--gray-50);border:var(--border);border-radius:6px;padding:6px 8px;text-align:center}
.ms-val{font-size:14px;font-weight:700;color:var(--gray-900);font-family:var(--mono);line-height:1;display:block}
.ms-label{font-size:9px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;display:block}

/* Sparkline */
.ac-sparkline-wrap{display:flex;flex-direction:column;gap:3px}
.sparkline-label{font-size:10px;color:var(--gray-400);display:flex;justify-content:space-between}
.ac-sparkline{display:flex;align-items:flex-end;gap:2px;height:28px}
.spark-bar{flex:1;border-radius:2px 2px 0 0;min-height:2px;transition:opacity .15s}
.spark-bar:hover{opacity:.7}

/* Follow */
.ac-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;padding-top:4px;border-top:var(--border)}
.ac-mutual{font-size:11px;color:var(--gray-400);display:flex;align-items:center;gap:4px}
.follow-btn{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .13s;border:1px solid;flex-shrink:0}
.follow-btn.default{background:var(--yellow);border-color:var(--yellow-dark);color:var(--gray-900)}
.follow-btn.default:hover{background:var(--yellow-dark)}
.follow-btn.following{background:var(--gray-100);border-color:var(--gray-200);color:var(--gray-600)}
.follow-btn.following:hover{background:var(--red-light);border-color:#FECACA;color:#A32D2D}

/* List view extras */
.list-view .ac-head{flex:0 0 200px}
.list-view .ac-tags{flex:0 0 200px}
.list-view .ac-mini-stats{flex:0 0 200px;grid-template-columns:repeat(3,1fr)}
.list-view .ac-sparkline-wrap{flex:0 0 120px}
.list-view .ac-footer{flex:1;justify-content:flex-end;padding-top:0;border-top:none}

/* ── NEARBY SECTION ── */
.nearby-section{background:white;border-bottom:var(--border)}
.nearby-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0}
.nearby-card{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:var(--border);border-right:var(--border);cursor:pointer;transition:background .12s;animation:fade-up .2s ease both}
.nearby-card:hover{background:var(--gray-50)}
.nearby-card:nth-child(even){border-right:none}
.nearby-card:last-child,.nearby-card:nth-last-child(2):nth-child(odd){border-bottom:none}
.nb-dist{font-size:12px;font-family:var(--mono);font-weight:600;color:var(--gray-500);width:44px;flex-shrink:0;text-align:right}
.nb-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.nb-info{flex:1;min-width:0}
.nb-name{font-size:13px;font-weight:600;color:var(--gray-900);margin-bottom:2px}
.nb-meta{font-size:11px;color:var(--gray-500)}
.nb-tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}

/* ── SIDEBAR CARDS ── */
.side-card{background:white;border:var(--border);border-radius:var(--radius-lg);overflow:hidden}
.sc-header{padding:12px 16px 9px;border-bottom:var(--border);display:flex;align-items:center;justify-content:space-between}
.sc-title{font-size:13px;font-weight:600;color:var(--gray-900)}
.sc-link{font-size:12px;color:var(--gray-500);cursor:pointer}
.sc-link:hover{color:var(--gray-700)}

/* Following list */
.following-item{display:flex;align-items:center;gap:9px;padding:9px 14px;border-bottom:var(--border);cursor:pointer;transition:background .1s}
.following-item:hover{background:var(--gray-50)}
.following-item:last-child{border-bottom:none}
.fi-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.fi-name{flex:1;font-size:13px;font-weight:500;color:var(--gray-900)}
.fi-meta{font-size:11px;color:var(--gray-400);white-space:nowrap}

/* Network stats */
.network-stats{display:grid;grid-template-columns:1fr 1fr;gap:0}
.ns-item{padding:12px 14px;text-align:center;border-right:var(--border)}
.ns-item:last-child{border-right:none}
.ns-val{font-size:20px;font-weight:700;font-family:var(--mono);color:var(--gray-900);line-height:1}
.ns-label{font-size:10px;color:var(--gray-500);margin-top:3px;text-transform:uppercase;letter-spacing:.04em}
.ns-delta{font-size:10px;font-family:var(--mono);color:var(--green);margin-top:2px}

/* Clubs to join */
.club-suggest{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:var(--border);cursor:pointer;transition:background .1s}
.club-suggest:hover{background:var(--gray-50)}
.club-suggest:last-child{border-bottom:none}
.cs-icon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.cs-name{font-size:12px;font-weight:600;color:var(--gray-900);margin-bottom:1px}
.cs-meta{font-size:11px;color:var(--gray-500)}

/* Sport breakdown */
.sport-bar-row{padding:8px 14px;display:flex;align-items:center;gap:10px;border-bottom:var(--border)}
.sport-bar-row:last-child{border-bottom:none}
.sbar-sport{font-size:12px;font-weight:500;color:var(--gray-900);width:80px;flex-shrink:0}
.sbar-track{flex:1;height:5px;background:var(--gray-100);border-radius:3px;overflow:hidden}
.sbar-fill{height:100%;border-radius:3px}
.sbar-count{font-size:11px;font-family:var(--mono);color:var(--gray-400);text-align:right;min-width:28px}

/* ── PROFILE MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(3px)}
.modal-overlay.open{display:flex}
.modal{background:white;border-radius:var(--radius-lg);width:100%;max-width:560px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.18);animation:fade-up .2s ease}
.modal-header{padding:0;position:relative}
.modal-hero{background:var(--gray-900);padding:24px;display:flex;gap:16px;align-items:flex-end;position:relative;overflow:hidden}
.modal-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(255,210,30,.12) 0%,transparent 70%);pointer-events:none}
.mh-av{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;flex-shrink:0;border:3px solid rgba(255,255,255,.15);position:relative;z-index:1}
.mh-info{flex:1;position:relative;z-index:1}
.mh-name{font-size:20px;font-weight:700;color:white;letter-spacing:-.01em;margin-bottom:2px}
.mh-handle{font-size:12px;color:var(--gray-400);font-family:var(--mono);margin-bottom:8px}
.mh-tags{display:flex;gap:5px;flex-wrap:wrap}
.mh-tag{padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.15)}
.mh-actions{position:relative;z-index:1;display:flex;flex-direction:column;gap:7px;align-self:center}
.modal-close-btn{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:rgba(255,255,255,.7);z-index:10;transition:background .1s}
.modal-close-btn:hover{background:rgba(0,0,0,.4)}
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:14px}
.modal-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:var(--border);border-radius:var(--radius);overflow:hidden}
.modal-stat{padding:12px;text-align:center;border-right:var(--border)}
.modal-stat:last-child{border-right:none}
.modal-stat .mv{font-size:18px;font-weight:700;font-family:var(--mono);color:var(--gray-900);line-height:1}
.modal-stat .ml{font-size:10px;color:var(--gray-500);margin-top:3px;text-transform:uppercase;letter-spacing:.04em}
.modal-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gray-500);margin-bottom:6px}
.recent-activity{background:var(--gray-50);border:var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.ra-head{display:flex;align-items:center;gap:8px}
.ra-sport-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-left:auto}
.ra-stats{display:flex;gap:6px}
.ra-stat{background:white;border:var(--border);border-radius:5px;padding:3px 8px;font-size:11px;font-family:var(--mono);color:var(--gray-700)}
.ra-ai{background:var(--yellow-light);border:1px solid #fde68a;border-radius:5px;padding:7px 10px;font-size:11px;color:#7a5c00;display:flex;gap:6px;align-items:flex-start;line-height:1.55}
.modal-footer-actions{display:flex;gap:8px}

.btn{padding:7px 16px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:var(--border);transition:all .13s;display:inline-flex;align-items:center;gap:6px;background:transparent;color:var(--gray-700)}
.btn:hover{background:var(--gray-100)}
.btn-primary{background:var(--gray-900);color:white;border-color:var(--gray-900)}.btn-primary:hover{background:var(--gray-700)}
.btn-yellow{background:var(--yellow);color:var(--gray-900);border-color:var(--yellow-dark);font-weight:600}.btn-yellow:hover{background:var(--yellow-dark)}
.btn-sm{padding:4px 12px;font-size:12px;border-radius:6px}
.btn-full{width:100%;justify-content:center}

/* Load more */
.load-more{padding:20px;text-align:center;background:white;border-top:var(--border)}
.load-btn{padding:9px 28px;border:var(--border);border-radius:8px;font-size:13px;font-weight:500;background:white;color:var(--gray-700);cursor:pointer;transition:background .1s}
.load-btn:hover{background:var(--gray-50)}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gray-900);color:white;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;transition:transform .3s ease;white-space:nowrap;box-shadow:var(--shadow-md)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:48px 24px;background:white;border-top:var(--border)}
.empty-state .ei{font-size:36px;margin-bottom:12px}
.empty-state h3{font-size:16px;font-weight:600;color:var(--gray-900);margin-bottom:6px}
.empty-state p{font-size:13px;color:var(--gray-500)}
</style>
</head>
<body>
<div class="app">

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-logo" onclick="nav('/feed')" style="cursor:pointer">
    <div class="logo-icon">🏟</div>
    <span class="logo-text">Arenas</span>
  </div>
  <div class="topbar-center">
    <div class="topbar-search">
      <span style="color:var(--gray-400);font-size:13px">🔍</span>
      <input type="text" id="search-input" placeholder="Search by name, sport, location, pace…" oninput="handleSearch(this.value)">
    </div>
  </div>
  <div class="topbar-actions">
    <div class="icon-btn" onclick="nav('/notifications')">🔔<div class="notif-dot"></div></div>
    <div style="position:relative" onmouseleave="document.getElementById('userMenu').style.display='none'">
      <div class="user-av" onclick="var d=document.getElementById('userMenu');d.style.display=(d.style.display==='block'?'none':'block')" style="cursor:pointer">JK</div>
      <div id="userMenu" style="display:none;position:absolute;right:0;top:calc(100% + 8px);background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);min-width:170px;z-index:300;overflow:hidden">
        <a href="/html/profile" style="display:block;padding:10px 14px;font-size:13px;color:#111827;text-decoration:none">My profile</a>
        <a href="/html/auth/logout" style="display:block;padding:10px 14px;font-size:13px;color:#DC2626;text-decoration:none;border-top:1px solid #f3f4f6">Log out</a>
      </div>
    </div>
  </div>

<script>
function closeModal(e) {
  if (!e || e.target.classList.contains('modal-overlay'))
    document.getElementById('modal-profile').classList.remove('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
<script>
// Reflect the real unread notification count on the bell icon.
(function(){
  var B = window.BASE || (location.pathname.indexOf("/html") === 0 ? "/html" : "");
  fetch(B + "/api/notifications").then(function(r){ return r.json(); }).then(function(data){
    var unread = (data && data.unreadCount) || 0;
    var dot = document.querySelector(".notif-dot");
    if (dot) dot.style.display = unread > 0 ? "block" : "none";
    var navBadge = document.getElementById("nav-unread-badge");
    if (navBadge) navBadge.textContent = unread > 0 ? unread : "";
  }).catch(function(){});
})();
</script>
<script>
// ── REAL ATHLETES (from window.ARENAS_DATA): grid + follow + filter + sort + search ──
(function() {
  const data = window.ARENAS_DATA;
  if (!data) return;
  const B = window.BASE || '';

  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

  // Update the logged-in user's identity in the nav + sidebar footer.
  const myName = (data.myProfile && data.myProfile.name) || 'Athlete';
  const myHandle = ((data.myProfile && data.myProfile.handle) || 'athlete').replace(/^@+/, '');
  const myInitials = myName.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();
  document.querySelectorAll('.user-av').forEach(el => {
    if (el.textContent.trim() === 'JK') el.textContent = myInitials;
  });
  document.querySelectorAll('.sidebar-footer div').forEach(el => {
    if (el.childElementCount !== 0) return;
    const t = el.textContent.trim();
    if (t === 'JK') el.textContent = myInitials;
    else if (t === 'Jamie King') el.textContent = myName;
    else if (t === '@jamiek') el.textContent = '@' + myHandle;
  });

  const athletes = data.athletes || [];
  const countEl = document.getElementById('athlete-count');
  const grid = document.getElementById('athlete-grid');
  if (!grid) return;

  const sportColors = {
    running:'background:#FFF7ED;color:#9A3412;border-color:#FDBA74',
    cycling:'background:#E0F2FE;color:#1E40AF;border-color:#93C5FD',
    climbing:'background:#F5F3FF;color:#5B21B6;border-color:#C4B5FD',
    swimming:'background:#F0FDFA;color:#134E4A;border-color:#5EEAD4',
    triathlon:'background:#FCE7F3;color:#72243E;border-color:#F4C0D1',
    football:'background:#ECFDF5;color:#166534;border-color:#86EFAC'
  };
  const sportEmojis = {
    running:'🏃 Running', cycling:'🚴 Cycling', climbing:'🧗 Climbing',
    swimming:'🏊 Swimming', triathlon:'🔱 Triathlon', football:'⚽ Football'
  };
  const avColors = [
    {bg:'#FEF9C3',color:'#854D0E'},{bg:'#FCE7F3',color:'#9D174D'},
    {bg:'#E0F2FE',color:'#0369A1'},{bg:'#F5F3FF',color:'#5B21B6'},
    {bg:'#ECFDF5',color:'#065F46'},{bg:'#FFF7ED',color:'#9A3412'},
    {bg:'#F0FDFA',color:'#134E4A'},{bg:'#FBEAF0',color:'#72243E'}
  ];

  // ── View / filter / sort / search state ──
  let view = 'grid';       // 'grid' | 'list'
  let show = 'all';        // 'all' | 'following'
  let sort = 'followers';  // 'followers' | 'name' | 'new'
  let query = '';

  // Deep-link support: /athletes?q=term — the topbar search on the other
  // athlete-facing pages lands here with the query prefilled and applied.
  (function () {
    var q0 = new URLSearchParams(location.search).get('q');
    if (q0 && q0.trim()) {
      query = q0.toLowerCase().trim();
      var si = document.getElementById('search-input');
      if (si) si.value = q0.trim();
    }
  })();

  function searchText(a){
    return [a.name, a.handle, a.location, (a.sports || []).join(' '), a.level]
      .join(' ').toLowerCase();
  }

  function visibleList(){
    let list = athletes.slice();
    if (show === 'following') list = list.filter(a => a.isFollowing);
    if (query) list = list.filter(a => searchText(a).includes(query));
    list.sort(function(a, b){
      if (sort === 'name') return (a.name || '').localeCompare(b.name || '');
      if (sort === 'new')  return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
      return (b.followerCount || 0) - (a.followerCount || 0);
    });
    return list;
  }

  function cardHTML(a, i){
    const av = avColors[athletes.indexOf(a) % avColors.length];
    const sports = a.sports || [];
    const primary = sports[0] || null;
    const sportStyle = primary ? (sportColors[primary] || '') : '';
    const sportLabel = primary ? (sportEmojis[primary] || primary) : null;
    const levelLabel = a.level ? (a.level.charAt(0).toUpperCase() + a.level.slice(1)) : null;
    const followers = a.followerCount || 0;
    return '' +
      '<div class="athlete-card" data-sport="' + esc(primary || 'all') + '" data-name="' + esc(a.name || 'Athlete') + '"' +
        ' data-user-id="' + esc(a.id) + '" style="animation-delay:' + (i * 0.03) + 's" onclick="openAthleteModal(\'' + esc(a.id) + '\')">' +
        '<div class="ac-head">' +
          '<div class="ac-av" style="background:' + av.bg + ';color:' + av.color + '">' + esc(a.initials) + '</div>' +
          '<div>' +
            '<div class="ac-name">' + esc(a.name || 'Athlete') + '</div>' +
            '<div class="ac-location">' + (a.location ? '📍 ' + esc(a.location) : '📍 Location not set') + ' · @' + esc(a.handle || 'athlete') + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="ac-tags">' +
          (sportLabel ? '<span class="pill" style="' + sportStyle + '">' + esc(sportLabel) + '</span>' : '') +
          (levelLabel ? '<span class="pill p-int">' + esc(levelLabel) + '</span>' : '') +
        '</div>' +
        '<div class="ac-mini-stats">' +
          '<div class="ms-item"><span class="ms-val">' + followers + '</span><span class="ms-label">followers</span></div>' +
          '<div class="ms-item"><span class="ms-val">' + (a.postCount || 0) + '</span><span class="ms-label">posts</span></div>' +
          '<div class="ms-item"><span class="ms-val">' + sports.length + '</span><span class="ms-label">sports</span></div>' +
        '</div>' +
        '<div class="ac-footer">' +
          '<div class="ac-mutual">' + followers + ' follower' + (followers === 1 ? '' : 's') + '</div>' +
          '<button class="follow-btn ' + (a.isFollowing ? 'following' : 'default') + '" id="follow-btn-' + esc(a.id) + '"' +
            ' onclick="event.stopPropagation();handleFollow(\'' + esc(a.id) + '\',this)">' +
            (a.isFollowing ? 'Following' : 'Follow') +
          '</button>' +
        '</div>' +
      '</div>';
  }

  function emptyState(title, sub){
    return '<div style="grid-column:1/-1;text-align:center;padding:56px 24px;background:white">' +
      '<div style="font-size:36px;margin-bottom:12px">👥</div>' +
      '<h3 style="font-size:16px;font-weight:600;color:var(--gray-900);margin-bottom:6px">' + esc(title) + '</h3>' +
      '<p style="font-size:13px;color:var(--gray-500);line-height:1.6">' + esc(sub) + '</p>' +
      '</div>';
  }

  function render(){
    const list = visibleList();
    if (countEl) countEl.textContent = list.length + ' athlete' + (list.length === 1 ? '' : 's');
    if (!athletes.length){
      grid.className = 'athlete-grid';
      grid.innerHTML = emptyState('No athletes yet', 'As more people join Arenas they will appear here.');
      return;
    }
    if (!list.length){
      grid.className = 'athlete-grid';
      if (show === 'following') grid.innerHTML = emptyState('Not following anyone yet', 'Follow athletes and they will show up here.');
      else if (query) grid.innerHTML = emptyState('No matches', 'No athletes match your search.');
      else grid.innerHTML = emptyState('No athletes', 'Nothing to show right now.');
      return;
    }
    grid.className = 'athlete-grid ' + (view === 'list' ? 'list-view' : 'grid-2');
    grid.innerHTML = list.map(cardHTML).join('');
  }

  // ── Public handlers referenced by inline markup ──
  window.setView = function(type){
    view = (type === 'list') ? 'list' : 'grid';
    ['grid','list'].forEach(v => { const b = document.getElementById('vt-' + v); if (b) b.classList.toggle('on', v === view); });
    render();
  };
  window.setShow = function(el, val){
    show = (val === 'following') ? 'following' : 'all';
    document.querySelectorAll('[data-show]').forEach(p => p.classList.remove('on'));
    if (el) el.classList.add('on');
    render();
  };
  window.setSort = function(val){
    sort = (val === 'name' || val === 'new') ? val : 'followers';
    render();
  };
  window.handleSearch = function(val){
    query = (val || '').toLowerCase().trim();
    render();
  };

  function syncFollowUI(id, isFollowing) {
    // The in-memory athlete model is the source of truth for the follower count;
    // every visible counter (card footer, card mini-stat, open modal) derives
    // from it so they never drift apart.
    const a = athletes.find(x => x.id === id);
    if (a) {
      if (isFollowing && !a.isFollowing) a.followerCount = (a.followerCount || 0) + 1;
      else if (!isFollowing && a.isFollowing) a.followerCount = Math.max(0, (a.followerCount || 0) - 1);
      a.isFollowing = isFollowing;
    }
    const followers = a ? (a.followerCount || 0) : 0;
    const followerText = followers + ' follower' + (followers === 1 ? '' : 's');
    const cardBtn = document.getElementById('follow-btn-' + id);
    if (cardBtn) {
      cardBtn.classList.toggle('following', isFollowing);
      cardBtn.classList.toggle('default', !isFollowing);
      cardBtn.textContent = isFollowing ? 'Following' : 'Follow';
      cardBtn.disabled = false;
      const card = cardBtn.closest('.athlete-card');
      if (card) {
        const mutual = card.querySelector('.ac-mutual');
        if (mutual) mutual.textContent = followerText;
        const firstStat = card.querySelector('.ac-mini-stats .ms-item .ms-val');
        if (firstStat) firstStat.textContent = followers;
      }
    }
    const modalBtn = document.getElementById('modal-follow-btn');
    if (modalBtn && modalBtn.dataset.userId === id) {
      modalBtn.disabled = false;
      modalBtn.textContent = isFollowing ? '✓ Following' : 'Follow';
      modalBtn.classList.toggle('btn-yellow', !isFollowing);
      const statsEl = document.getElementById('modal-stats');
      const firstMv = statsEl && statsEl.querySelector('.modal-stat .mv');
      if (firstMv) firstMv.textContent = followers;
    }
    // When viewing "Following", a change in membership must drop/keep the card.
    if (show === 'following') render();
  }

  window.handleFollow = async function(userId, btn){
    const wasFollowing = btn.classList.contains('following');
    btn.disabled = true;
    btn.textContent = wasFollowing ? 'Unfollowing…' : 'Following…';
    try {
      const res = await fetch(B + '/api/follow/' + userId, { method: wasFollowing ? 'DELETE' : 'POST' });
      const result = await res.json();
      if (result.error) {
        showToast('Error: ' + result.error);
        btn.disabled = false;
        btn.textContent = wasFollowing ? 'Following' : 'Follow';
        return;
      }
      syncFollowUI(userId, !!result.following);
      showToast(result.following ? '✓ Following — their posts will appear in your feed' : 'Unfollowed');
    } catch (err) {
      showToast('Something went wrong — please try again');
      btn.disabled = false;
      btn.textContent = wasFollowing ? 'Following' : 'Follow';
    }
  };

  window.openAthleteModal = function(userId){
    const a = athletes.find(x => x.id === userId);
    if (!a) return;
    const av = avColors[athletes.indexOf(a) % avColors.length];
    const modal = document.getElementById('modal-profile');
    if (!modal) return;
    const avEl = document.getElementById('modal-av');
    if (avEl) {
      avEl.textContent = a.initials;
      avEl.style.cssText = 'width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;flex-shrink:0;border:3px solid rgba(255,255,255,.15);position:relative;z-index:1;background:' + av.bg + ';color:' + av.color;
    }
    const nameEl = document.getElementById('modal-name');
    if (nameEl) nameEl.textContent = a.name || 'Athlete';
    const handleEl = document.getElementById('modal-handle');
    if (handleEl) handleEl.textContent = '@' + (a.handle || 'athlete') + (a.location ? ' · ' + a.location : '');
    const tagsEl = document.getElementById('modal-tags');
    if (tagsEl) tagsEl.innerHTML = (a.sports || []).map(s => '<span class="mh-tag">' + esc(sportEmojis[s] || s) + '</span>').join('');
    const statsEl = document.getElementById('modal-stats');
    if (statsEl) statsEl.innerHTML =
      '<div class="modal-stat"><div class="mv">' + (a.followerCount || 0) + '</div><div class="ml">Followers</div></div>' +
      '<div class="modal-stat"><div class="mv">' + (a.postCount || 0) + '</div><div class="ml">Posts</div></div>' +
      '<div class="modal-stat"><div class="mv">' + (a.sports ? a.sports.length : 0) + '</div><div class="ml">Sports</div></div>' +
      '<div class="modal-stat"><div class="mv">' + esc(a.level || '—') + '</div><div class="ml">Level</div></div>';
    const bioEl = document.getElementById('modal-bio-section');
    if (bioEl) bioEl.innerHTML = a.bio
      ? '<div><div class="modal-section-title">About</div><div style="font-size:13px;color:var(--gray-600);line-height:1.65">' + esc(a.bio) + '</div></div>'
      : '';
    const recentEl = document.getElementById('modal-recent');
    if (recentEl) recentEl.innerHTML = '';
    const actionsEl = document.getElementById('modal-footer-actions');
    if (actionsEl) actionsEl.innerHTML =
      '<button class="btn ' + (a.isFollowing ? '' : 'btn-yellow') + '" id="modal-follow-btn" data-user-id="' + esc(a.id) + '" onclick="handleModalFollow(\'' + esc(a.id) + '\')">' +
        (a.isFollowing ? '✓ Following' : 'Follow') +
      '</button>' +
      '<button class="btn" onclick="showToast(\'Messaging coming soon!\')">💬 Message</button>';
    modal.classList.add('open');
  };

  window.handleModalFollow = async function(userId){
    const a = athletes.find(x => x.id === userId);
    if (!a) return;
    const wasFollowing = a.isFollowing;
    const modalBtn = document.getElementById('modal-follow-btn');
    if (modalBtn) { modalBtn.disabled = true; modalBtn.textContent = wasFollowing ? 'Unfollowing…' : 'Following…'; }
    try {
      const res = await fetch(B + '/api/follow/' + userId, { method: wasFollowing ? 'DELETE' : 'POST' });
      const result = await res.json();
      if (result.error) {
        showToast('Error: ' + result.error);
        if (modalBtn) { modalBtn.disabled = false; modalBtn.textContent = wasFollowing ? '✓ Following' : 'Follow'; }
        return;
      }
      syncFollowUI(userId, !!result.following);
      showToast(result.following ? '✓ Following' : 'Unfollowed');
    } catch (err) {
      showToast('Something went wrong — please try again');
      if (modalBtn) { modalBtn.disabled = false; modalBtn.textContent = wasFollowing ? '✓ Following' : 'Follow'; }
    }
  };

  render();
})();
</script>
<script>
// Shared "My clubs" sidebar renderer — identical on every athlete-facing page so
// the sidebar always reflects the viewer's real club memberships
// (window.ARENAS_DATA.clubs) from the same Supabase query. No hardcoded club data
// lives in the static HTML.
(function () {
  var clubs = (window.ARENAS_DATA && window.ARENAS_DATA.clubs) || [];
  var label = null;
  document.querySelectorAll('.sidebar .nav-section-label').forEach(function (l) {
    if (/^\s*my clubs\s*$/i.test(l.textContent || '')) label = l;
  });
  if (!label) return;
  var parent = label.parentNode;
  var sib = label.nextElementSibling;
  while (sib && sib.classList && sib.classList.contains('nav-item')) {
    var next = sib.nextElementSibling;
    sib.remove();
    sib = next;
  }
  var anchor = label.nextElementSibling;
  var sportIcons = { running: '🏃', cycling: '🚴', climbing: '🧗', swimming: '🏊', football: '⚽', triathlon: '🔱', hiking: '🥾', yoga: '🧘', weightlifting: '🏋️' };
  if (!clubs.length) {
    var empty = document.createElement('div');
    empty.className = 'nav-item';
    empty.style.cssText = 'color:var(--gray-400);cursor:default';
    empty.textContent = 'No clubs yet';
    parent.insertBefore(empty, anchor);
    return;
  }
  clubs.forEach(function (club) {
    var item = document.createElement('div');
    item.className = 'nav-item';
    item.onclick = function () {
      if (typeof nav !== 'function') return;
      if (club.role === 'admin' || club.role === 'coach') { nav('/clubs/dashboard?club=' + club.id); }
      else { nav('/clubs/member/' + club.id); }
    };
    var ic = document.createElement('span');
    ic.className = 'nav-icon';
    ic.textContent = sportIcons[club.sport] || '🏟';
    item.appendChild(ic);
    item.appendChild(document.createTextNode(' ' + (club.name || 'Club')));
    parent.insertBefore(item, anchor);
  });
})();
</script>
</body>
