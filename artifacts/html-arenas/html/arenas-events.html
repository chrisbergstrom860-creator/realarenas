<!DOCTYPE html>
<html lang="en">
<head>
<script>
window.BASE = window.location.pathname.startsWith('/html') ? '/html' : '';
window.nav = function(path){ window.location.href = window.BASE + path; };
document.addEventListener('DOMContentLoaded', function(){
  if (window.BASE === '') {
    document.querySelectorAll('[href^="/html/"]').forEach(function(el){ el.setAttribute('href', el.getAttribute('href').slice(5)); });
    document.querySelectorAll('[action^="/html/"]').forEach(function(el){ el.setAttribute('action', el.getAttribute('action').slice(5)); });
  }
});
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arenas — Events</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/html/arenas.css">
<style>:root{--green-light:#ECFDF5;--blue-light:#EFF6FF;--orange-light:#FFF7ED;--purple-light:#F5F3FF;--teal:#14B8A6;--teal-light:#F0FDFA;--pink-light:#FBEAF0;--pink:#D4537E}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
button,select,input,textarea{font-family:var(--font)}
@keyframes fade-up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.8)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}/* ── LAYOUT ── *//* ── TOPBAR ── */
.icon-btn{width:34px;height:34px;border-radius:7px;border:var(--border);background:white;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;position:relative;transition:background .1s}
.icon-btn:hover{background:var(--gray-50)}/* ── SIDEBAR ── */

/* ── MAIN CONTENT ── */
.main{display:flex;flex-direction:column;overflow:hidden}


/* ── BODY LAYOUT ── */
.body-grid{display:grid;grid-template-columns:1fr 300px;flex:1;overflow:hidden}
.events-col{overflow-y:auto;border-right:var(--border)}
.events-col::-webkit-scrollbar{width:4px}
.events-col::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:2px}
.sidebar-col{overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:14px}
.sidebar-col::-webkit-scrollbar{display:none}


/* ── SECTION HEADER ── */
.section-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 8px;border-bottom:var(--border);background:white;position:sticky;top:0;z-index:10}
.section-title{font-size:13px;font-weight:600;color:var(--gray-900)}
.section-meta{font-size:12px;color:var(--gray-500)}


/* ── EVENTS GRID ── */
.events-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
@media (max-width:768px){
  body:has(.bottom-nav) .main{overflow-y:auto;-webkit-overflow-scrolling:touch}
  body:has(.bottom-nav) .body-grid{display:block;overflow:visible}
  body:has(.bottom-nav) .events-col{overflow:visible;border-right:none}
  body:has(.bottom-nav) .sidebar-col{overflow:visible}
  body:has(.bottom-nav) .events-grid{grid-template-columns:1fr}
}

.ev-date-box{border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;width:44px;height:44px;flex-shrink:0}
.edb-day{font-size:16px;font-weight:700;line-height:1;font-family:var(--mono)}
.edb-mon{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
.ev-title{font-size:13px;font-weight:600;color:var(--gray-900);line-height:1.35;margin-bottom:2px}
.ev-loc{font-size:11px;color:var(--gray-400)}
.ev-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid transparent;white-space:nowrap;display:inline-block}
.t-free{background:var(--green-light);color:#166534;border-color:#86EFAC}
.ev-social-text{font-size:11px;color:var(--gray-500)}
.going-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.pend-dot{width:6px;height:6px;border-radius:50%;background:var(--orange);flex-shrink:0}


/* ── SIDEBAR CARDS ── */
.side-card{background:white;border:var(--border);border-radius:var(--radius-lg);overflow:hidden}
.sc-header{padding:12px 16px 9px;border-bottom:var(--border);display:flex;align-items:center;justify-content:space-between}
.sc-title{font-size:13px;font-weight:600;color:var(--gray-900);display:flex;align-items:center;gap:5px}
.sc-link{font-size:12px;color:var(--gray-500);cursor:pointer;text-decoration:none}
.sc-link:hover{color:var(--gray-700)}


/* RSVP list items */
.rsvp-item{display:flex;align-items:center;gap:9px;padding:9px 16px;border-bottom:var(--border);cursor:pointer;transition:background .1s}
.rsvp-item:hover{background:var(--gray-50)}
.rsvp-item:last-child{border-bottom:none}
.ri-date-box{width:34px;height:34px;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.ri-day{font-size:13px;font-weight:700;font-family:var(--mono);line-height:1}
.ri-mon{font-size:7px;font-weight:600;text-transform:uppercase}
.ri-name{flex:1;font-size:12px;font-weight:600;color:var(--gray-900)}
.ri-sport{font-size:10px;color:var(--gray-400)}
.ri-status{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px}
.ris-going{background:var(--green-light);color:#166534}
.ris-pend{background:var(--orange-light);color:#9A3412}



/* Stats strip */
.stats-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:0}
.stat-block{padding:10px 14px;text-align:center;border-right:var(--border)}
.stat-block:last-child{border-right:none}
.sb-val{font-size:18px;font-weight:700;font-family:var(--mono);color:var(--gray-900);line-height:1}
.sb-label{font-size:10px;color:var(--gray-500);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}

.btn{padding:9px 18px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:var(--border);transition:all .13s;display:inline-flex;align-items:center;gap:6px;background:transparent;color:var(--gray-700)}
.btn:hover{background:var(--gray-100)}
.btn-yellow{background:var(--yellow);color:var(--gray-900);border-color:var(--yellow-dark);font-weight:600}.btn-yellow:hover{background:var(--yellow-dark)}
.btn-full{width:100%;justify-content:center}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gray-900);color:white;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;transition:transform .3s ease;white-space:nowrap;box-shadow:var(--shadow-md)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>

  setTimeout(()=>t.classList.remove('show'),2800);

<script>
// Reflect the real unread notification count on the bell icon.
(function(){
  var B = window.BASE || (location.pathname.indexOf("/html") === 0 ? "/html" : "");
  fetch(B + "/api/notifications").then(function(r){ return r.json(); }).then(function(data){
    var unread = (data && data.unreadCount) || 0;
    var dot = document.querySelector(".notif-dot");
    if (dot) dot.style.display = unread > 0 ? "block" : "none";
    var navBadge = document.getElementById("nav-unread-badge");
    if (navBadge) navBadge.textContent = unread > 0 ? unread : "";
  }).catch(function(){});
})();
</script>
<style>
.evx-input,.evx-select,.evx-textarea{width:100%;padding:9px 11px;border:1px solid var(--gray-200);border-radius:8px;font-size:13px;font-family:inherit;color:var(--gray-900);background:#fff;box-sizing:border-box}
.evx-input:focus,.evx-select:focus,.evx-textarea:focus{outline:none;border-color:var(--yellow-dark)}
.evx-textarea{resize:vertical;min-height:64px}
.evx-label{display:block;font-size:11px;font-weight:600;color:var(--gray-600);margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
.evx-field{margin-bottom:12px}
.evx-row{display:flex;gap:10px}.evx-row>.evx-field{flex:1}
.evx-invitee{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;font-size:13px;cursor:pointer}
.evx-invitee:hover{background:var(--gray-50)}
.evx-card{border:var(--border);border-radius:12px;padding:16px;margin-bottom:12px;display:flex;gap:14px;background:#fff}
.evx-rbtn{padding:7px 13px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--gray-200);background:#fff;color:var(--gray-700)}
.evx-rbtn.on{background:var(--green-light);color:#166534;border-color:#86EFAC}
.evx-rbtn.int.on{background:var(--yellow-light);color:#7a5c00;border-color:var(--yellow-dark)}
</style>
<script>
// ── Real Events wiring (Supabase-backed) ──
// Server injects window.ARENAS_DATA = { userId, profile, following[], clubs[] }.
// All fetches are BASE-prefixed so the shared proxy routes them to this app
// (the bare "/api" belongs to the separate api-server).
(function () {
  var B = window.BASE || (location.pathname.indexOf('/html') === 0 ? '/html' : '');
  var DATA = window.ARENAS_DATA || {};
  var following = DATA.following || [];
  var clubs = DATA.clubs || [];

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
    });
  }
  var SPORT_ICON = { running:'🏃', cycling:'🚴', climbing:'🧗', swimming:'🏊',
    triathlon:'🔱', football:'⚽', weightlifting:'🏋️', hiking:'🥾', yoga:'🧘', any:'✦' };
  function sportLabel(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : 'Event'; }
  function dParts(d) {
    var dt = new Date(d);
    if (isNaN(dt.getTime())) return { day:'?', mon:'' };
    return { day: String(dt.getDate()), mon: dt.toLocaleDateString('en-GB', { month:'short' }) };
  }
  function dateLine(d) {
    var dt = new Date(d);
    if (isNaN(dt.getTime())) return '';
    return dt.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'long' }) +
      ' · ' + dt.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
  }

  function tag(text, style) {
    return '<span class="tag" style="background:var(--gray-100);color:var(--gray-600);border-color:var(--gray-200);' + (style||'') + '">' + esc(text) + '</span>';
  }

  function buildEventCard(ev) {
    var p = dParts(ev.date);
    var tags = '';
    tags += '<span class="tag" style="background:var(--gray-900);color:#fff;border-color:var(--gray-900)">' + (SPORT_ICON[ev.sport] || '✦') + ' ' + esc(sportLabel(ev.sport)) + '</span>';
    if (ev.event_type) tags += tag(ev.event_type);
    if (ev.distance) tags += tag(ev.distance);
    tags += (ev.entry_fee ? tag(esc(ev.entry_fee)) : '<span class="tag t-free">Free</span>');
    if (ev.level) tags += tag(ev.level);
    if (ev.clubs && ev.clubs.name) tags += tag('🏃 ' + ev.clubs.name);

    var social = '';
    if (ev.followersGoing && ev.followersGoing.length) {
      var names = ev.followersGoing.slice(0, 3).map(function (f) { return f.name; }).join(', ');
      var extra = ev.followersGoing.length > 3 ? ' +' + (ev.followersGoing.length - 3) : '';
      social = esc(names) + extra + ' going';
    } else if (ev.goingCount) {
      social = ev.goingCount + (ev.goingCount === 1 ? ' person going' : ' people going');
    } else {
      social = 'No RSVPs yet — be first!';
    }

    var goingOn = ev.myRsvpStatus === 'going';
    var intOn = ev.myRsvpStatus === 'interested';
    var actions;
    if (ev.isOwner) {
      actions =
        '<span style="font-size:11px;font-weight:600;color:#166534;background:var(--green-light);padding:4px 9px;border-radius:20px">Your event</span>' +
        '<button class="evx-rbtn" style="color:#b91c1c;border-color:#fecaca" onclick="ARENAS_EVENTS.del(\'' + esc(ev.id) + '\')">Delete</button>';
    } else {
      actions =
        '<button class="evx-rbtn' + (goingOn ? ' on' : '') + '" onclick="ARENAS_EVENTS.rsvp(\'' + esc(ev.id) + '\',\'' + (goingOn ? 'cancelled' : 'going') + '\')">' + (goingOn ? '✓ Going' : 'Going') + '</button>' +
        '<button class="evx-rbtn int' + (intOn ? ' on' : '') + '" onclick="ARENAS_EVENTS.rsvp(\'' + esc(ev.id) + '\',\'' + (intOn ? 'cancelled' : 'interested') + '\')">' + (intOn ? '★ Interested' : 'Interested') + '</button>';
    }

    return '' +
      '<div class="evx-card">' +
        '<div class="ev-date-box" style="background:var(--yellow-light);width:54px;height:54px;flex-shrink:0">' +
          '<div class="edb-day" style="color:#7a5c00">' + esc(p.day) + '</div>' +
          '<div class="edb-mon" style="color:#7a5c00">' + esc(p.mon) + '</div>' +
        '</div>' +
        '<div style="flex:1;min-width:0">' +
          '<div class="ev-title">' + esc(ev.title) + '</div>' +
          '<div class="ev-loc">📍 ' + esc(ev.location || '') + (ev.date ? ' · ' + esc(dateLine(ev.date)) : '') + '</div>' +
          (ev.description ? '<div style="font-size:12px;color:var(--gray-500);margin:6px 0">' + esc(ev.description) + '</div>' : '') +
          '<div class="ev-tags" style="margin-top:8px">' + tags + '</div>' +
          '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px;flex-wrap:wrap">' +
            '<span class="ev-social-text" style="color:var(--gray-500)">' + social + '</span>' +
            '<div style="display:flex;gap:8px">' + actions + '</div>' +
          '</div>' +
          '<div style="font-size:11px;color:var(--gray-400);margin-top:6px">Organised by ' + esc(ev.creatorName || 'Athlete') + ' · @' + esc(ev.creatorHandle || 'athlete') + '</div>' +
        '</div>' +
      '</div>';
  }

  function renderEvents(payload) {
    // Merge the three lists, dedupe by id, sort by date ascending.
    var byId = {};
    ['upcomingEvents','clubEvents','myCreatedEvents'].forEach(function (k) {
      (payload[k] || []).forEach(function (ev) { byId[ev.id] = ev; });
    });
    var events = Object.keys(byId).map(function (k) { return byId[k]; })
      .sort(function (a, b) { return new Date(a.date) - new Date(b.date); });

    var grid = document.getElementById('events-grid');
    if (grid) {
      grid.style.gridTemplateColumns = '1fr';
      if (!events.length) {
        grid.innerHTML = '<div style="padding:40px 16px;text-align:center;color:var(--gray-400);font-size:14px">No upcoming events yet. Be the first to create one!</div>';
      } else {
        grid.innerHTML = events.map(buildEventCard).join('');
      }
    }
    var loadMore = document.getElementById('load-more-section');
    if (loadMore) loadMore.style.display = 'none';
    var meta = document.getElementById('section-meta');
    if (meta) meta.textContent = events.length + (events.length === 1 ? ' event' : ' events') + ' · sorted by date';
    var fc = document.getElementById('filter-count');
    if (fc) fc.textContent = events.length + ' events';

    renderMyRsvps(payload.myRsvps || []);
  }

  function renderMyRsvps(rsvps) {
    // Target the existing "Your RSVPs" side-card (find by its title text).
    var card = null;
    document.querySelectorAll('.side-card').forEach(function (c) {
      var t = c.querySelector('.sc-title');
      if (t && /your rsvps/i.test(t.textContent)) card = c;
    });
    if (!card) return;
    // Remove the mock rsvp/stat rows but keep the header.
    card.querySelectorAll('.rsvp-item, .stats-strip, .rsvp-empty').forEach(function (n) { n.remove(); });

    var going = rsvps.filter(function (r) { return r.status === 'going'; });
    var interested = rsvps.filter(function (r) { return r.status === 'interested'; });

    var stats = document.createElement('div');
    stats.className = 'stats-strip';
    stats.style.borderBottom = 'var(--border)';
    stats.innerHTML =
      '<div class="stat-block"><div class="sb-val" style="color:var(--green)">' + going.length + '</div><div class="sb-label">Going</div></div>' +
      '<div class="stat-block"><div class="sb-val">' + interested.length + '</div><div class="sb-label">Interested</div></div>' +
      '<div class="stat-block"><div class="sb-val">' + rsvps.length + '</div><div class="sb-label">Total</div></div>';
    card.appendChild(stats);

    if (!rsvps.length) {
      var empty = document.createElement('div');
      empty.className = 'rsvp-empty';
      empty.style.cssText = 'padding:14px;font-size:12px;color:var(--gray-400);text-align:center';
      empty.textContent = "You haven't RSVP'd to any events yet.";
      card.appendChild(empty);
      return;
    }
    rsvps.slice(0, 8).forEach(function (r) {
      var ev = r.events || {};
      var p = dParts(ev.date);
      var item = document.createElement('div');
      item.className = 'rsvp-item';
      var statusCls = r.status === 'going' ? 'ris-going' : 'ris-pend';
      var statusTxt = r.status === 'going' ? '✓ Going' : '★ Interested';
      item.innerHTML =
        '<div class="' + (r.status === 'going' ? 'going-dot' : 'pend-dot') + '"></div>' +
        '<div class="ri-date-box" style="background:var(--gray-100)">' +
          '<div class="ri-day" style="color:var(--gray-700)">' + esc(p.day) + '</div>' +
          '<div class="ri-mon" style="color:var(--gray-500)">' + esc(p.mon) + '</div>' +
        '</div>' +
        '<div style="flex:1;min-width:0">' +
          '<div class="ri-name">' + esc(ev.title || 'Event') + '</div>' +
          '<div class="ri-sport">' + esc(sportLabel(ev.sport)) + (ev.location ? ' · ' + esc(ev.location) : '') + '</div>' +
        '</div>' +
        '<span class="ri-status ' + statusCls + '">' + statusTxt + '</span>';
      card.appendChild(item);
    });
  }

  function loadEvents() {
    return fetch(B + '/api/events', { credentials:'same-origin' })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data && data.error) { console.log('Events load error:', data.error); return; }
        renderEvents(data || {});
      })
      .catch(function (e) { console.log('Events fetch failed:', e.message); });
  }


  // ── Create event modal ──
  function openCreateEvent() {
    var existing = document.getElementById('evx-modal');
    if (existing) existing.remove();
    var clubOpts = '<option value="">— Personal event —</option>' +
      clubs.map(function (c) { return '<option value="' + esc(c.id) + '">' + esc(c.name) + '</option>'; }).join('');
    var inviteeRows = following.length
      ? following.map(function (f) {
          return '<label class="evx-invitee"><input type="checkbox" value="' + esc(f.id) + '"> ' + esc(f.name) + ' <span style="color:var(--gray-400)">@' + esc(f.handle) + '</span></label>';
        }).join('')
      : '<div style="font-size:12px;color:var(--gray-400);padding:6px 8px">Follow people to invite them.</div>';

    var overlay = document.createElement('div');
    overlay.id = 'evx-modal';
    overlay.className = 'modal-overlay open';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-start;justify-content:center;z-index:500;padding:32px 16px;overflow-y:auto';
    overlay.addEventListener('click', function (e) { if (e.target === overlay) overlay.remove(); });
    overlay.innerHTML =
      '<div style="background:#fff;border-radius:14px;max-width:520px;width:100%;padding:22px" onclick="event.stopPropagation()">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">' +
          '<div style="font-size:17px;font-weight:700;color:var(--gray-900)">Create an event</div>' +
          '<div style="cursor:pointer;font-size:20px;color:var(--gray-400)" onclick="document.getElementById(\'evx-modal\').remove()">×</div>' +
        '</div>' +
        '<form id="evx-form">' +
          '<div class="evx-field"><label class="evx-label">Title *</label><input class="evx-input" name="title" required placeholder="e.g. Saturday long run"></div>' +
          '<div class="evx-row">' +
            '<div class="evx-field"><label class="evx-label">Sport *</label><select class="evx-select" name="sport" required>' +
              '<option value="">Select…</option><option value="running">Running</option><option value="cycling">Cycling</option><option value="climbing">Climbing</option><option value="swimming">Swimming</option><option value="triathlon">Triathlon</option><option value="football">Football</option><option value="weightlifting">Weightlifting</option><option value="hiking">Hiking</option><option value="yoga">Yoga</option>' +
            '</select></div>' +
            '<div class="evx-field"><label class="evx-label">Type</label><input class="evx-input" name="event_type" placeholder="e.g. 10K, Sportive"></div>' +
          '</div>' +
          '<div class="evx-row">' +
            '<div class="evx-field"><label class="evx-label">Date & time *</label><input class="evx-input" type="datetime-local" name="date" required></div>' +
            '<div class="evx-field"><label class="evx-label">Location *</label><input class="evx-input" name="location" required placeholder="e.g. Victoria Park, London"></div>' +
          '</div>' +
          '<div class="evx-row">' +
            '<div class="evx-field"><label class="evx-label">Distance</label><input class="evx-input" name="distance" placeholder="e.g. 13.1 mi"></div>' +
            '<div class="evx-field"><label class="evx-label">Entry fee</label><input class="evx-input" name="entry_fee" placeholder="e.g. £20 (blank = free)"></div>' +
          '</div>' +
          '<div class="evx-row">' +
            '<div class="evx-field"><label class="evx-label">Max participants</label><input class="evx-input" type="number" min="1" name="max_participants" placeholder="Optional"></div>' +
            '<div class="evx-field"><label class="evx-label">Level</label><input class="evx-input" name="level" placeholder="e.g. All levels"></div>' +
          '</div>' +
          '<div class="evx-field"><label class="evx-label">Description</label><textarea class="evx-textarea" name="description" placeholder="Tell people what to expect…"></textarea></div>' +
          '<div class="evx-row">' +
            '<div class="evx-field"><label class="evx-label">Club</label><select class="evx-select" name="club_id">' + clubOpts + '</select></div>' +
            '<div class="evx-field"><label class="evx-label">Visibility</label><select class="evx-select" name="visibility"><option value="public">Public</option><option value="club">Club only</option><option value="private">Private (invite only)</option></select></div>' +
          '</div>' +
          '<div class="evx-field"><label class="evx-label">Invite people you follow</label><div id="evx-invitees" style="max-height:140px;overflow-y:auto;border:var(--border);border-radius:8px;padding:4px">' + inviteeRows + '</div></div>' +
          '<div id="evx-error" style="display:none;color:#b91c1c;font-size:12px;margin-bottom:10px"></div>' +
          '<button type="submit" id="evx-submit" class="btn btn-yellow btn-full" style="justify-content:center">Create event</button>' +
        '</form>' +
      '</div>';
    document.body.appendChild(overlay);
    document.getElementById('evx-form').addEventListener('submit', submitCreate);
  }

  function submitCreate(e) {
    e.preventDefault();
    var form = e.target;
    var btn = document.getElementById('evx-submit');
    var errBox = document.getElementById('evx-error');
    errBox.style.display = 'none';
    var invitees = [].slice.call(document.querySelectorAll('#evx-invitees input:checked')).map(function (i) { return i.value; });
    var body = {
      title: form.title.value.trim(),
      sport: form.sport.value,
      event_type: form.event_type.value.trim() || null,
      date: form.date.value,
      location: form.location.value.trim(),
      distance: form.distance.value.trim() || null,
      entry_fee: form.entry_fee.value.trim() || null,
      max_participants: form.max_participants.value || null,
      level: form.level.value.trim() || null,
      description: form.description.value.trim() || null,
      club_id: form.club_id.value || null,
      visibility: form.visibility.value,
      invitees: invitees
    };
    if (!body.title || !body.sport || !body.date || !body.location) {
      errBox.textContent = 'Please fill in title, sport, date and location.';
      errBox.style.display = 'block';
      return;
    }
    btn.disabled = true; btn.textContent = 'Creating…';
    fetch(B + '/api/events/create', {
      method:'POST', credentials:'same-origin',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify(body)
    }).then(function (r) { return r.json(); }).then(function (data) {
      if (data && data.error) {
        errBox.textContent = data.error; errBox.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Create event';
        return;
      }
      var m = document.getElementById('evx-modal'); if (m) m.remove();
      if (window.showToast) showToast('✓ Event created!');
      loadEvents();
    }).catch(function (err) {
      errBox.textContent = 'Something went wrong: ' + err.message; errBox.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Create event';
    });
  }

  function rsvp(eventId, desired) {
    // Toggle off if the viewer already holds the desired status.
    fetch(B + '/api/events/' + encodeURIComponent(eventId) + '/rsvp', {
      method:'POST', credentials:'same-origin',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ status: desired })
    }).then(function (r) { return r.json(); }).then(function (data) {
      if (data && data.error) { if (window.showToast) showToast(data.error); return; }
      if (window.showToast) {
        showToast(desired === 'going' ? '✓ You\'re going!'
          : desired === 'interested' ? '★ Marked interested'
          : 'RSVP removed');
      }
      loadEvents();
    }).catch(function (e) { console.log('RSVP failed:', e.message); });
  }

  function del(eventId) {
    if (!window.confirm('Delete this event? This cannot be undone.')) return;
    fetch(B + '/api/events/' + encodeURIComponent(eventId), {
      method:'DELETE', credentials:'same-origin'
    }).then(function (r) { return r.json(); }).then(function (data) {
      if (data && data.error) { if (window.showToast) showToast(data.error); return; }
      if (window.showToast) showToast('Event deleted');
      loadEvents();
    }).catch(function (e) { console.log('Delete failed:', e.message); });
  }

  window.ARENAS_EVENTS = { rsvp: rsvp, del: del };
  window.openCreateEvent = openCreateEvent;

  loadEvents();
})();
</script>
<script>
// Shared "My clubs" sidebar renderer — identical on every athlete-facing page so
// the sidebar always reflects the viewer's real club memberships
// (window.ARENAS_DATA.clubs) from the same Supabase query. No hardcoded club data
// lives in the static HTML.
(function () {
  var clubs = (window.ARENAS_DATA && window.ARENAS_DATA.clubs) || [];
  var label = null;
  document.querySelectorAll('.sidebar .nav-section-label').forEach(function (l) {
    if (/^\s*my clubs\s*$/i.test(l.textContent || '')) label = l;
  });
  if (!label) return;
  var parent = label.parentNode;
  var sib = label.nextElementSibling;
  while (sib && sib.classList && sib.classList.contains('nav-item')) {
    var next = sib.nextElementSibling;
    sib.remove();
    sib = next;
  }
  var anchor = label.nextElementSibling;
  var sportIcons = { running: '🏃', cycling: '🚴', climbing: '🧗', swimming: '🏊', football: '⚽', triathlon: '🔱', hiking: '🥾', yoga: '🧘', weightlifting: '🏋️' };
  if (!clubs.length) {
    var empty = document.createElement('div');
    empty.className = 'nav-item';
    empty.style.cssText = 'color:var(--gray-400);cursor:default';
    empty.textContent = 'No clubs yet';
    parent.insertBefore(empty, anchor);
    return;
  }
  clubs.forEach(function (club) {
    var item = document.createElement('div');
    item.className = 'nav-item';
    item.onclick = function () {
      if (typeof nav !== 'function') return;
      if (club.role === 'admin' || club.role === 'coach') { nav('/clubs/dashboard?club=' + club.id); }
      else { nav('/clubs/member/' + club.id); }
    };
    var ic = document.createElement('span');
    ic.className = 'nav-icon';
    ic.textContent = sportIcons[club.sport] || '🏟';
    item.appendChild(ic);
    item.appendChild(document.createTextNode(' ' + (club.name || 'Club')));
    parent.insertBefore(item, anchor);
  });
})();
</script>
<script>
// Personalise the user chrome (top-right header avatar, sidebar-footer avatar +
// name + handle) from the logged-in user's real identity. The server injects
// window.ARENAS_DATA.profile.{name,handle} (from Supabase auth metadata). We match
// by text content — inside <header> or .sidebar-footer, a leaf whose trimmed text
// is "JK" becomes the initials, "Jamie King" the real name, "@jamiek" the
// real handle — so chrome updates regardless of class. Content elsewhere untouched.
(function () {
  var data = window.ARENAS_DATA;
  if (!data || !data.profile || !data.profile.name) return;
  var name = data.profile.name.trim();
  var handle = (data.profile.handle || 'athlete').replace(/^@+/, '');
  var initials = name.split(/\s+/)
    .map(function (n) { return n[0]; }).join('').slice(0, 2).toUpperCase();
  if (!initials) return;
  ['header', '.sidebar-footer'].forEach(function (sel) {
    var root = document.querySelector(sel);
    if (!root) return;
    root.querySelectorAll('div').forEach(function (el) {
      if (el.childElementCount !== 0) return;
      var t = el.textContent.trim();
      if (t === 'JK') el.textContent = initials;
      else if (t === 'Jamie King') el.textContent = name;
      else if (t === '@jamiek') el.textContent = '@' + handle;
    });
  });
})();
</script>
