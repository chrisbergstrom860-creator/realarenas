<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/html/manifest.webmanifest">
<meta name="theme-color" content="#FFD21E">
<link rel="apple-touch-icon" href="/html/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Arenas">
<script src="/html/arenas-pwa.js" defer></script>
<title>Checkout canceled · Arenas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --yellow:#FFD21E;--yellow-dark:#E6B800;
  --gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-400:#9CA3AF;
  --gray-500:#6B7280;--gray-700:#374151;--gray-900:#111827;
  --font:'Source Sans 3',sans-serif;
  --border:1px solid var(--gray-200);--radius:8px;--radius-lg:12px;
  --shadow-md:0 10px 30px rgba(0,0,0,0.10);
}
body{font-family:var(--font);background:var(--gray-50);color:var(--gray-700);font-size:14px;line-height:1.5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.wrap{width:100%;max-width:460px}
.brand{display:flex;align-items:center;gap:9px;justify-content:center;margin-bottom:18px}
.logo-icon{width:30px;height:30px;background:var(--yellow);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-size:17px;font-weight:700;color:var(--gray-900)}
.card{background:white;border:var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);padding:32px 26px;text-align:center;display:flex;flex-direction:column;gap:12px;align-items:center}
.emoji{font-size:40px}
h1{font-size:18px;font-weight:700;color:var(--gray-900)}
p{font-size:13px;color:var(--gray-500)}
.btn{padding:12px 18px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--yellow-dark);width:100%;text-align:center;display:inline-flex;align-items:center;justify-content:center;background:var(--yellow);color:var(--gray-900);text-decoration:none;transition:all .13s;margin-top:6px}
.btn:hover{background:var(--yellow-dark)}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><div class="logo-icon">🏟</div><span class="logo-text">Arenas</span></div>
  <div class="card">
    <div class="emoji">👋</div>
    <h1>Checkout canceled</h1>
    <p>Nothing was charged and your plan hasn&rsquo;t changed. You can start again any time.</p>
    <a class="btn" id="back-btn" href="/feed">Back to Arenas</a>
  </div>
</div>
<script>
(function(){
  // Same base-path sniff the marketing pages use: /html on Replit, root on Railway.
  var base = location.pathname.indexOf('/html/') === 0 ? '/html' : '';
  document.getElementById('back-btn').setAttribute('href', base + '/feed');
})();
</script>
</body>
</html>
