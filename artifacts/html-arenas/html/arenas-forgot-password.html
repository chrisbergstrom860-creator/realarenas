<!DOCTYPE html>
<html lang="en">
<head>
<script>
window.BASE = window.location.pathname.startsWith('/html') ? '/html' : '';
window.nav = function(path){ window.location.href = window.BASE + path; };
document.addEventListener('DOMContentLoaded', function(){
  if (window.BASE === '') {
    document.querySelectorAll('[href^="/html/"]').forEach(function(el){ el.setAttribute('href', el.getAttribute('href').slice(5)); });
    document.querySelectorAll('[action^="/html/"]').forEach(function(el){ el.setAttribute('action', el.getAttribute('action').slice(5)); });
  }
});
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/html/manifest.webmanifest">
<meta name="theme-color" content="#FFD21E">
<link rel="icon" href="/html/favicon.ico" sizes="48x48">
<link rel="icon" href="/html/arenas-icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/html/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Arenas">
<script src="/html/arenas-pwa.js" defer></script>
<meta name="referrer" content="no-referrer">
<title>Arenas — Reset your password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --yellow:#FFD21E;--yellow-dark:#E6B800;--yellow-light:#FFF9E0;
  --gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-300:#D1D5DB;
  --gray-400:#9CA3AF;--gray-500:#6B7280;--gray-600:#4B5563;--gray-700:#374151;
  --gray-800:#1F2937;--gray-900:#111827;--green:#10B981;
  --font:'Source Sans 3',sans-serif;--mono:'IBM Plex Mono',monospace;
  --border:1px solid var(--gray-200);
  --shadow-md:0 4px 16px rgba(0,0,0,0.09);
}
body{font-family:var(--font);background:var(--gray-50);color:var(--gray-800);font-size:14px;line-height:1.5;min-height:100vh;display:flex;flex-direction:column}
button,select,input,textarea{font-family:var(--font)}
a{color:inherit}
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:var(--border);padding:0 40px;height:60px;display:flex;align-items:center}
.nav-logo{display:flex;align-items:center;gap:8px;cursor:pointer;text-decoration:none}
.nav-logo-icon{width:30px;height:30px;display:block;flex-shrink:0}
.nav-logo-text{font-size:16px;font-weight:700;color:var(--gray-900)}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 20px}
.card{width:100%;max-width:420px;background:#fff;border:var(--border);border-radius:14px;box-shadow:var(--shadow-md);padding:36px 32px}
.card-icon{width:46px;height:46px;background:var(--yellow-light);border:1px solid var(--yellow-dark);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:18px}
.card-title{font-size:23px;font-weight:800;color:var(--gray-900);letter-spacing:-.02em;margin-bottom:7px}
.card-sub{font-size:14px;color:var(--gray-500);line-height:1.6;margin-bottom:24px}
.field{margin-bottom:16px}
.label{display:block;font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:6px}
.input{width:100%;padding:11px 13px;border:1px solid var(--gray-300);border-radius:9px;font-size:14px;color:var(--gray-900);transition:border-color .12s,box-shadow .12s}
.input:focus{outline:none;border-color:var(--yellow-dark);box-shadow:0 0 0 3px rgba(255,210,30,.18)}
.btn{display:block;width:100%;padding:12px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--yellow-dark);background:var(--yellow);color:var(--gray-900);text-align:center;text-decoration:none;transition:background .13s}
.btn:hover{background:var(--yellow-dark)}
.banner{border-radius:9px;padding:11px 13px;font-size:13px;line-height:1.5;margin-bottom:18px}
.banner.err{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}
.banner.ok{background:#ECFDF5;color:#047857;border:1px solid #A7F3D0}
.backlink{display:block;text-align:center;margin-top:18px;font-size:13px;color:var(--gray-500);text-decoration:none}
.backlink:hover{color:var(--gray-800)}
@media(max-width:520px){.nav{padding:0 16px}.card{padding:28px 20px}}
</style>
</head>
<body>
<nav class="nav">
  <a class="nav-logo" href="/html/landing">
    <img class="nav-logo-icon" src="/html/arenas-icon.svg" alt="">
    <span class="nav-logo-text">Arenas</span>
  </a>
</nav>
<div class="wrap">
  <div class="card">
    <div class="card-icon">🔑</div>
    <div class="card-title">Reset your password</div>
    <div class="card-sub">Enter the email address linked to your Arenas account and we'll send you a link to set a new password.</div>
    <div id="banner" class="banner" style="display:none"></div>
    <form action="/html/auth/forgot-password" method="POST">
      <div class="field">
        <label class="label" for="email">Email</label>
        <input class="input" id="email" name="email" type="email" placeholder="you@example.com" required autofocus>
      </div>
      <button type="submit" class="btn">Send reset link</button>
    </form>
    <a class="backlink" href="/html/landing#login">← Back to log in</a>
  </div>
</div>
<script>
(function(){
  var err = new URLSearchParams(location.search).get('error');
  if(!err) return;
  var b = document.getElementById('banner');
  b.className = 'banner err';
  b.textContent = err === 'missing'
    ? 'Please enter your email address.'
    : 'Something went wrong. Please try again.';
  b.style.display = 'block';
})();
</script>
</body>
</html>
